name: Update README

on:
  schedule:
    - cron: '0 1 * * *' # Every day at 01:00
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
        with:
          install: true
          cache: true
          experimental: true
      - name: Build README.md
        run: mise start
      - name: Commit
        run: |
          git config --global user.name 'Axel Leroy'
          git config --global user.email 'axeleroy@users.noreply.github.com'
          git add README.md
          git commit -am "Updated README" || exit 0
          git push
          

